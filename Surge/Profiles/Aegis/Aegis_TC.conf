# > 可選區域分流功能（預設關閉）

# - 用途：為普通用戶提供簡化的國際分流能力，減少訪問受阻情況
# - 預設：關閉，保持 Aegis 防火牆強安全策略（FINAL,REJECT）
# - 啟用：刪除規則行首 “# ” 即可啟用對應區域分流條目

# GEOIP,US,Proxy # 美國區域流量走代理

# GEOIP,GB,Proxy # 英國區域流量走代理

# GEOIP,FR,Proxy # 法國區域流量走代理

# GEOIP,DE,Proxy # 德國區域流量走代理

# GEOIP,RU,Proxy # 俄羅斯區域流量走代理

# GEOIP,EU,Proxy # 歐盟區域流量走代理

# GEOIP,AU,Proxy # 澳洲區域流量走代理

# GEOIP,JP,Proxy # 日本區域流量走代理

# GEOIP,KR,Proxy # 韓國區域流量走代理

# GEOIP,SG,Proxy # 新加坡區域流量走代理

# > GEOIP 匹配中國大陸

GEOIP,CN,DIRECT # GEOIP 匹配中國大陸

# > Final 規則

FINAL,REJECT

# - 說明：FINAL,REJECT 為 Aegis 預設拒絕策略，用於確保未顯式放行的流量全部被阻斷
# - 安全性：保持為 REJECT 可維持最高防護等級，防止未知域名、可疑請求或潛在攻擊流量繞過規則
# - 場景：如需以訪問優先為主，可將 Final 規則切換為 Proxy，以提升訪問相容性，但整體安全性會相應下降

[Host]

# > 本地回環 IPv6 映射

ip6-localhost = ::1

# > 本地路由器登入與熱點識別（無須指定 DNS，保留交由系統解析）

routerlogin.net = system
router.asus.com = system
amplifi.lan = system
*.lan = system
_hotspot_.m2m = system
hotspot.cslwifi.com = system
dns.alidns.com = 223.5.5.5 # 主 IPv4
dns.alidns.com = 223.6.6.6 # 備 IPv4
dns.alidns.com = 2400:3200::1 # IPv6
