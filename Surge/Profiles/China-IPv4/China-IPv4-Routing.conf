# > GEOIP 匹配中国大陆
GEOIP,CN,DIRECT // GEOIP 匹配中国大陆
# > Final 规则
FINAL,Proxy

[Host]
updates.g.aaplimg.com = iosapps.itunes.apple.com.download.ks-cdn.com
iosapps.itunes.apple.com = iosapps.itunes.apple.com.download.ks-cdn.com
# > 本地路由器登录与热点识别（无须指定 DNS，保留交由系统解析）
routerlogin.net = system
router.asus.com = system
amplifi.lan = system
*.lan = system
_hotspot_.m2m = system
hotspot.cslwifi.com = system
# > 中国大陆 DoH 端点引导：指定各自的国内传统 DNS 来解析端点域名。
# 不静态锁定 DoH 端点 IP，避免运营商/地区调度变化导致可用性下降；HTTPS 证书验证仍会阻止伪造端点返回有效 DNS 结果。
dns.alidns.com = server:223.5.5.5
doh.pub = server:119.29.29.29

