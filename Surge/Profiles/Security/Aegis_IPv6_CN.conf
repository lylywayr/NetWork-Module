# > 可选区域分流功能（默认关闭）

# - 用途：为普通用户提供简化的国际分流能力，减少访问受阻情况
# - 默认：关闭，保持 Aegis 防火墙强安全策略（FINAL,REJECT）
# - 启用：删除规则行首 “# ” 即可启用对应区域分流条目

# GEOIP,US,Proxy # 美国区域流量走代理

# GEOIP,GB,Proxy # 英国区域流量走代理

# GEOIP,FR,Proxy # 法国区域流量走代理

# GEOIP,DE,Proxy # 德国区域流量走代理

# GEOIP,RU,Proxy # 俄罗斯区域流量走代理

# GEOIP,EU,Proxy # 欧盟区域流量走代理

# GEOIP,AU,Proxy # 澳大利亚区域流量走代理

# GEOIP,JP,Proxy # 日本区域流量走代理

# GEOIP,KR,Proxy # 韩国区域流量走代理

# GEOIP,SG,Proxy # 新加坡区域流量走代理

# > GEOIP 匹配中国大陆

GEOIP,CN,DIRECT # GEOIP 匹配中国大陆

# > Final 规则

FINAL,REJECT

# - 说明：FINAL,REJECT 为 Aegis 默认拒绝策略，用于确保未显式放行的流量全部被阻断
# - 安全性：保持为 REJECT 可维持最高防护等级，防止未知域名、可疑请求或潜在攻击流量绕过规则
# - 场景：如需以访问优先为主，可将 Final 规则切换为 Proxy，以提升访问兼容性，但整体安全性会相应下降

[Host]

# > 本地回环 IPv6 映射

ip6-localhost = ::1

# > 本地路由器登录与热点识别（无须指定 DNS，保留交由系统解析）

routerlogin.net = system
router.asus.com = system
amplifi.lan = system
*.lan = system
_hotspot_.m2m = system
hotspot.cslwifi.com = system
dns.alidns.com = 223.5.5.5 # 主 IPv4
dns.alidns.com = 223.6.6.6 # 备 IPv4
dns.alidns.com = 2400:3200::1 # IPv6