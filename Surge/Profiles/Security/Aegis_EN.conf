# > Local Area Network Addresses

RULE-SET,LAN,DIRECT

# > Optional Regional GeoIP Routing (Disabled by default)

# - Purpose: Provides simplified international routing for general users and reduces access failures
# - Default: Disabled to maintain the Aegis firewall’s strong security policy (FINAL,REJECT)
# - Enable: Remove the leading “# ” to activate the corresponding regional routing entry

# GEOIP,US,Proxy # US region traffic routed through proxy

# GEOIP,GB,Proxy # UK region traffic routed through proxy

# GEOIP,FR,Proxy # France region traffic routed through proxy

# GEOIP,DE,Proxy # Germany region traffic routed through proxy

# GEOIP,RU,Proxy # Russia region traffic routed through proxy

# GEOIP,EU,Proxy # EU region traffic routed through proxy

# GEOIP,AU,Proxy # Australia region traffic routed through proxy

# GEOIP,JP,Proxy # Japan region traffic routed through proxy

# GEOIP,KR,Proxy # South Korea region traffic routed through proxy

# GEOIP,SG,Proxy # Singapore region traffic routed through proxy

# > GEOIP Match for Mainland China

GEOIP,CN,DIRECT # GEOIP match for Mainland China

# > Final Rule

FINAL,REJECT

# - Description: FINAL,REJECT is the default deny strategy in Aegis, ensuring that all traffic not explicitly allowed is blocked
# - Security: Keeping REJECT maintains the highest protection level and prevents unknown domains, suspicious requests, or potential attack traffic from bypassing the rules
# - Scenario: If access priority is required, the Final rule can be switched to Proxy to improve compatibility, but overall security will be reduced accordingly

[Host]

# > IPv6 loopback mapping

ip6-localhost = ::1

# > Local Router Login & Hotspot Identification (No need to specify DNS, leave it to system resolution)

routerlogin.net = system
router.asus.com = system
amplifi.lan = system
*.lan = system
_hotspot_.m2m = system
hotspot.cslwifi.com = system
dns.alidns.com = 223.5.5.5 # Primary IPv4
dns.alidns.com = 223.6.6.6 # Secondary IPv4
dns.alidns.com = 2400:3200::1 # IPv6