name: GitHub Private Raw
description: 为 raw.githubusercontent.com / gist.githubusercontent.com 私有资源请求注入 GitHub Token，用于 Egern 引用私有仓库规则集、模块、脚本等资源。
author: lylywayr
homepage: https://github.com/lylywayr/NetWork-Module
icon: lock.shield
compat_arguments:
  USERNAME: lylywayr
  TOKEN: GITHUB_TOKEN
compat_arguments_desc: |-
  USERNAME: GitHub 用户名或组织名，默认 lylywayr。
  TOKEN: GitHub Personal Access Token，至少需要目标私有仓库 Contents Read 权限。

  启用后，私有 raw 链接可使用不带 token 的普通地址。

header_rewrites:
  - add:
      match: "^https?://(raw|gist)\\.githubusercontent\\.com/{{{USERNAME}}}"
      name: Authorization
      value: "token {{{TOKEN}}}"
      type: request
  - replace:
      match: "^https?://(raw|gist)\\.githubusercontent\\.com"
      name: Accept-Language
      value: en-us
      type: request

mitm:
  hostnames:
    includes:
      - raw.githubusercontent.com
      - gist.githubusercontent.com
